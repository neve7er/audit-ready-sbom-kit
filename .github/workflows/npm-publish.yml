name: Publish to npm

on:
  push:
    tags:
      - 'beta/v*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - id: detect
        run: |
          RAW_TAG="${{ github.ref_name }}"
          # Strip any surrounding whitespace/newlines
          TAG="${RAW_TAG#"${RAW_TAG%%[![:space:]]*}"}"
          TAG="${TAG%"${TAG##*[![:space:]]}"}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Detected tag: '${TAG}'"

      - name: Publish beta
        if: startsWith(steps.detect.outputs.tag, 'beta/v')
        run: |
          echo "Publishing beta version"
          npm publish --tag beta --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish stable
        if: startsWith(steps.detect.outputs.tag, 'v') && !startsWith(steps.detect.outputs.tag, 'beta/v')
        run: |
          echo "Publishing stable version"
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Fail on unknown tag format
        if: steps.detect.outputs.tag != '' && !startsWith(steps.detect.outputs.tag, 'beta/v') && !startsWith(steps.detect.outputs.tag, 'v')
        run: |
          echo "ERROR: Unknown tag format: '${{ steps.detect.outputs.tag }}'"
          echo "Expected:"
          echo "  - beta/v*  for beta releases"
          echo "  - v*       for stable releases"
          exit 1

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(needs.publish.outputs.tag, 'v') && !startsWith(needs.publish.outputs.tag, 'beta/v')
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}